<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Claude Code Leak — Hermes Agent Workflows</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  .label {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    padding: 28px 16px 12px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 3s ease;
  }
  .label.hidden { opacity: 0; }
  .label-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .label-sub { font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <iframe
    src="https://www.youtube.com/embed/Lp9CVrKFZe8?autoplay=1&rel=0&playsinline=1"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
    allowfullscreen
    title="MASSIVE Claude Code leak fallout + Hermes agent workflows">
  </iframe>
  <div class="label" id="lbl">
    <div class="label-title">📺 Claude Code Leak Fallout + Hermes Agent Workflows</div>
    <div class="label-sub">Live stream · April 1, 2026</div>
  </div>
</div>
<script>
  // Auto-hide label after 4 seconds
  setTimeout(() => {
    const l = document.getElementById('lbl');
    if (l) l.classList.add('hidden');
  }, 4000);
</script>
</body>
</html>
